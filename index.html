<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ramallah Web GIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- LEAFLET -->
  <link rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- DARK MODE MAP -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/2.4.0/Control.FullScreen.min.css"/>

  <style>

    html, body{
      height:100%;
      margin:0;
      font-family:Arial, sans-serif;
    }

    #map{
      width:100%;
      height:100%;
    }

    /* =========================
        POPUP
    ========================== */

    .popup-table{
      border-collapse:collapse;
      width:100%;
    }

    .popup-table td{
      border-bottom:1px solid #ddd;
      padding:4px;
      font-size:12px;
    }

    .popup-title{
      font-weight:bold;
      margin-bottom:6px;
    }

    /* =========================
        LEGEND
    ========================== */

    .legend{
      background:white;
      padding:10px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      font-size:13px;
      line-height:20px;
    }

    .legend-box{
      width:16px;
      height:16px;
      display:inline-block;
      margin-right:6px;
    }

    /* =========================
        DARK MODE BUTTON
    ========================== */

    .dark-btn{

      background:white;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      font-weight:bold;
      box-shadow:0 0 8px rgba(0,0,0,0.3);

    }

  </style>
</head>

<body>

<div id="map"></div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

  /* =========================
      MAP
  ========================== */

  var map = L.map("map").setView([31.9038, 35.2034], 11);

  /* =========================
      BASEMAPS
  ========================== */

  // الوضع العادي
  var lightMap = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      attribution:"&copy; OpenStreetMap"
    }
  ).addTo(map);

  // الوضع الليلي
  var darkMap = L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    {
      attribution:"&copy; CARTO"
    }
  );

  /* =========================
      POPUP FUNCTION
  ========================== */

  function popupAttributes(feature, layer){

    if(!feature.properties) return;

    let html = `
      <div class="popup-title">Attributes</div>
      <table class="popup-table">
    `;

    for(let key in feature.properties){

      html += `
        <tr>
          <td><b>${key}</b></td>
          <td>${feature.properties[key]}</td>
        </tr>
      `;
    }

    html += `</table>`;

    layer.bindPopup(html);
  }

  /* =========================
      LOAD DATA
  ========================== */

  Promise.all([

    fetch("Ramallah_Boundary.json").then(r => r.json()),
    fetch("Road_Network.json").then(r => r.json()),
    fetch("Living.json").then(r => r.json()),
    fetch("Parking.json").then(r => r.json()),
    fetch("Health_Services.json").then(r => r.json())

  ]).then(initLayers);

  /* =========================
      INIT LAYERS
  ========================== */

  function initLayers(data){

    let [
      boundary,
      roads,
      living,
      parking,
      health
    ] = data;

    /* =========================
        BOUNDARY
    ========================== */

    var boundaryLayer = L.geoJSON(boundary, {

      style:{
        color:"#ffffff",
        weight:3,
        fillOpacity:0
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        ROADS
    ========================== */

    var roadsLayer = L.geoJSON(roads, {

      style:function(feature){

        let roadType = feature.properties.type;

        // اقليمي
        if(
          roadType === "Regional" ||
          roadType === "اقليمي"
        ){

          return{
            color:"#ff3300",
            weight:5
          };
        }

        // داخلي
        else{

          return{
            color:"#ffaa00",
            weight:2
          };
        }
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        LIVING
    ========================== */

    var livingLayer = L.geoJSON(living, {

      style:{
        color:"#00bfff",
        weight:2,
        fillOpacity:0
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        PARKING
    ========================== */

    var parkingLayer = L.geoJSON(parking, {

      style:{
        color:"#1b5e20",
        weight:1.5,
        fillColor:"#2e7d32",
        fillOpacity:0.8
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        HEALTH SERVICES
    ========================== */

    var healthLayer = L.geoJSON(health, {

      pointToLayer:function(feature, latlng){

        return L.circleMarker(latlng, {

          radius:6,
          fillColor:"#ff0000",
          color:"#ffffff",
          weight:1,
          fillOpacity:0.9

        });

      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        FIT BOUNDS
    ========================== */

    map.fitBounds(boundaryLayer.getBounds());

    /* =========================
        LAYER CONTROL
    ========================== */

    var baseMaps = {
      "Light Mode": lightMap,
      "Dark Mode": darkMap
    };

    var overlayMaps = {
      "Ramallah Boundary": boundaryLayer,
      "Road Network": roadsLayer,
      "Living Areas": livingLayer,
      "Parking": parkingLayer,
      "Health Services": healthLayer
    };

    L.control.layers(baseMaps, overlayMaps, {

      collapsed:false

    }).addTo(map);

    /* =========================
        LEGEND
    ========================== */

    var legend = L.control({position:"bottomright"});

    legend.onAdd = function(){

      var div = L.DomUtil.create("div","legend");

      div.innerHTML = `

        <b>Legend</b><br><br>

        <div>
          <span class="legend-box"
          style="border:2px solid #00bfff;background:black;">
          </span>
          Living Areas
        </div>

        <div>
          <span class="legend-box"
          style="background:#ff3300;">
          </span>
          Regional Roads
        </div>

        <div>
          <span class="legend-box"
          style="background:#ffaa00;">
          </span>
          Internal Roads
        </div>

        <div>
          <span class="legend-box"
          style="background:#2e7d32;border:1px solid #1b5e20;">
          </span>
          Parking
        </div>

        <div>
          <span class="legend-box"
          style="background:#ff0000;border-radius:50%;">
          </span>
          Health Services
        </div>

        <div>
          <span class="legend-box"
          style="background:#ffffff;">
          </span>
          Ramallah Boundary
        </div>
      `;

      return div;
    };

    legend.addTo(map);

  }

</script>

</body>
</html>
