<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Ramallah GIS Map</title>

    <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            padding:0;
        }

        #map{
            width:100%;
            height:100vh;
        }

    </style>
</head>

<body>

<div id="map"></div>

<script>

/////////////////////////////////////////////////////
// إنشاء الخريطة
/////////////////////////////////////////////////////

var map = L.map('map').setView([31.9,35.2], 12);

/////////////////////////////////////////////////////
// BaseMap
/////////////////////////////////////////////////////

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'OpenStreetMap'
}).addTo(map);

/////////////////////////////////////////////////////
// روابط ملفات GitHub
/////////////////////////////////////////////////////

var HealthURL =
'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/Health_Services.json';

var LivingURL =
'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/Living.json';

var ParkingURL =
'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/Parking.json';

var BoundaryURL =
'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/Ramallah_Boundary.json';

var RoadsURL =
'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/Road_Network.json';

/////////////////////////////////////////////////////
// Layers
/////////////////////////////////////////////////////

var healthLayer;
var livingLayer;
var parkingLayer;
var boundaryLayer;
var roadsLayer;

/////////////////////////////////////////////////////
// Popup Function
/////////////////////////////////////////////////////

function popupContent(properties){

    var text = "";

    for(var key in properties){

        text += "<b>" + key + "</b>: "
        + properties[key] + "<br>";

    }

    return text;
}

/////////////////////////////////////////////////////
// تحميل Health Services
/////////////////////////////////////////////////////

fetch(HealthURL)
.then(res => res.json())
.then(data => {

    healthLayer = L.geoJSON(data,{

        pointToLayer:function(feature,latlng){

            return L.circleMarker(latlng,{
                radius:6,
                fillColor:"red",
                color:"black",
                weight:1,
                fillOpacity:0.8
            });

        },

        onEachFeature:function(feature,layer){

            layer.bindPopup(
                popupContent(feature.properties)
            );

        }

    }).addTo(map);

});

/////////////////////////////////////////////////////
// تحميل Living
/////////////////////////////////////////////////////

fetch(LivingURL)
.then(res => res.json())
.then(data => {

    livingLayer = L.geoJSON(data,{

        style:{
            color:"orange",
            weight:2,
            fillOpacity:0.4
        },

        onEachFeature:function(feature,layer){

            layer.bindPopup(
                popupContent(feature.properties)
            );

        }

    }).addTo(map);

});

/////////////////////////////////////////////////////
// تحميل Parking
/////////////////////////////////////////////////////

fetch(ParkingURL)
.then(res => res.json())
.then(data => {

    parkingLayer = L.geoJSON(data,{

        style:{
            color:"blue",
            weight:2,
            fillOpacity:0.5
        },

        onEachFeature:function(feature,layer){

            layer.bindPopup(
                popupContent(feature.properties)
            );

        }

    }).addTo(map);

});

/////////////////////////////////////////////////////
// تحميل Boundary
/////////////////////////////////////////////////////

fetch(BoundaryURL)
.then(res => res.json())
.then(data => {

    boundaryLayer = L.geoJSON(data,{

        style:{
            color:"black",
            weight:3,
            fillOpacity:0
        },

        onEachFeature:function(feature,layer){

            layer.bindPopup(
                popupContent(feature.properties)
            );

        }

    }).addTo(map);

    map.fitBounds(boundaryLayer.getBounds());

});

/////////////////////////////////////////////////////
// تحميل Roads
/////////////////////////////////////////////////////

fetch(RoadsURL)
.then(res => res.json())
.then(data => {

    roadsLayer = L.geoJSON(data,{

        style:{
            color:"green",
            weight:2
        },

        onEachFeature:function(feature,layer){

            layer.bindPopup(
                popupContent(feature.properties)
            );

        }

    }).addTo(map);

});

/////////////////////////////////////////////////////
// Layer Control
/////////////////////////////////////////////////////

setTimeout(function(){

    var overlays = {

        "Health Services": healthLayer,
        "Living": livingLayer,
        "Parking": parkingLayer,
        "Boundary": boundaryLayer,
        "Road Network": roadsLayer

    };

    L.control.layers(null,overlays,{
        collapsed:false
    }).addTo(map);

},3000);

</script>

</body>
</html>
