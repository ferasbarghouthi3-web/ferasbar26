<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ramallah Web GIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .popup-table{
      border-collapse: collapse;
      width: 100%;
    }

    .popup-table td{
      border-bottom:1px solid #ddd;
      padding:4px;
      font-size:12px;
    }

    .popup-title{
      font-weight:bold;
      margin-bottom:6px;
    }

    .legend{
      background:white;
      padding:10px;
      border-radius:8px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      font-size:13px;
      line-height:20px;
    }

    .legend-box{
      width:16px;
      height:16px;
      display:inline-block;
      margin-right:6px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

  /* =========================
      MAP
  ========================== */

  var map = L.map("map").setView([31.9038, 35.2034], 11);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      attribution: "&copy; OpenStreetMap"
    }
  ).addTo(map);

  /* =========================
      POPUP FUNCTION
  ========================== */

  function popupAttributes(feature, layer){

    if(!feature.properties) return;

    let html = `
      <div class="popup-title">Attributes</div>
      <table class="popup-table">
    `;

    for(let key in feature.properties){
      html += `
        <tr>
          <td><b>${key}</b></td>
          <td>${feature.properties[key]}</td>
        </tr>
      `;
    }

    html += `</table>`;

    layer.bindPopup(html);
  }

  /* =========================
      LOAD DATA
  ========================== */

  Promise.all([

    fetch("Ramallah_Boundary.json").then(r => r.json()),
    fetch("Road_Network.json").then(r => r.json()),
    fetch("Living.json").then(r => r.json()),
    fetch("Parking.json").then(r => r.json()),
    fetch("Health_Services.json").then(r => r.json())

  ]).then(initLayers);

  /* =========================
      INIT LAYERS
  ========================== */

  function initLayers(data){

    let [
      boundary,
      roads,
      living,
      parking,
      health
    ] = data;

    /* =========================
        RAMALLAH BOUNDARY
    ========================== */

    var boundaryLayer = L.geoJSON(boundary, {

      style:{
        color:"#000000",
        weight:3,
        fillOpacity:0
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        ROAD NETWORK
    ========================== */

    var roadsLayer = L.geoJSON(roads, {

      style:{
        color:"#ff6600",
        weight:2
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        LIVING
    ========================== */

    var livingLayer = L.geoJSON(living, {

      style:{
        color:"#0066cc",
        weight:1.5,
        fillColor:"#4da6ff",
        fillOpacity:0.5
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        PARKING
    ========================== */

    var parkingLayer = L.geoJSON(parking, {

      style:{
        color:"#800080",
        weight:1.5,
        fillColor:"#cc66ff",
        fillOpacity:0.7
      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        HEALTH SERVICES
    ========================== */

    var healthLayer = L.geoJSON(health, {

      pointToLayer: function(feature, latlng){

        return L.circleMarker(latlng, {

          radius: 6,
          fillColor: "#ff0000",
          color: "#800000",
          weight: 1,
          opacity: 1,
          fillOpacity: 0.9

        });

      },

      onEachFeature: popupAttributes

    }).addTo(map);

    /* =========================
        FIT BOUNDS
    ========================== */

    map.fitBounds(boundaryLayer.getBounds());

    /* =========================
        LAYER CONTROL
    ========================== */

    L.control.layers(null, {

      "Health_Services.json": healthLayer,
      "Living.json": livingLayer,
      "Parking.json": parkingLayer,
      "Ramallah_Boundary.json": boundaryLayer,
      "Road_Network.json": roadsLayer

    }, {

      collapsed:false

    }).addTo(map);

    /* =========================
        LEGEND
    ========================== */

    var legend = L.control({position:"bottomright"});

    legend.onAdd = function(){

      var div = L.DomUtil.create("div","legend");

      div.innerHTML = `
        <b>Legend</b><br><br>

        <div>
          <span class="legend-box" style="background:#ff0000;border-radius:50%;"></span>
          Health_Services.json
        </div>

        <div>
          <span class="legend-box" style="background:#4da6ff;border:1px solid #0066cc;"></span>
          Living.json
        </div>

        <div>
          <span class="legend-box" style="background:#cc66ff;border:1px solid #800080;"></span>
          Parking.json
        </div>

        <div>
          <span class="legend-box" style="background:#000;"></span>
          Ramallah_Boundary.json
        </div>

        <div>
          <span class="legend-box" style="background:#ff6600;"></span>
          Road_Network.json
        </div>
      `;

      return div;
    };

    legend.addTo(map);

  }

</script>

</body>
</html>
