<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nearest Hospital Finder</title>

  <!-- LEAFLET -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- LEAFLET ROUTING -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

  <style>

    html,body{
      margin:0;
      height:100%;
      font-family:Arial;
    }

    #map{
      width:100%;
      height:100%;
    }

    .control-box{

      position:absolute;
      top:10px;
      right:10px;
      z-index:1000;

      background:white;
      padding:12px;
      border-radius:10px;

      box-shadow:0 0 10px rgba(0,0,0,0.3);

    }

    select,button{

      width:220px;
      padding:8px;
      margin-top:8px;

    }

    button{

      cursor:pointer;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;

    }

    button:hover{

      background:#0056b3;

    }

  </style>
</head>

<body>

<div class="control-box">

  <h3>البحث عن أقرب مستشفى</h3>

  <select id="hospitalType">

    <option value="all">
      جميع المستشفيات
    </option>

    <option value="government">
      حكومي
    </option>

    <option value="private">
      خاص
    </option>

  </select>

  <button onclick="findNearestHospital()">
    ايجاد أقرب مستشفى
  </button>

</div>

<div id="map"></div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ROUTING -->
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>

  /* =========================
      MAP
  ========================== */

  const map = L.map('map').setView(
    [31.9038,35.2034],
    13
  );

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:'OpenStreetMap'
    }
  ).addTo(map);

  /* =========================
      VARIABLES
  ========================== */

  let userLocation = null;

  let hospitals = [];

  let routingControl = null;

  /* =========================
      USER LOCATION
  ========================== */

  navigator.geolocation.getCurrentPosition(pos => {

    userLocation = [

      pos.coords.latitude,
      pos.coords.longitude

    ];

    L.marker(userLocation)

      .addTo(map)

      .bindPopup("موقعك الحالي")

      .openPopup();

    map.setView(userLocation,14);

  });

  /* =========================
      LOAD HOSPITALS
  ========================== */

  fetch("Health_Services.json")

    .then(res => res.json())

    .then(data => {

      hospitals = data.features;

      hospitals.forEach(h => {

        const coords = [

          h.geometry.coordinates[1],
          h.geometry.coordinates[0]

        ];

        const name =
          h.properties.BUSNIESS_NAME_A;

        L.marker(coords)

          .addTo(map)

          .bindPopup(name);

      });

    });

  /* =========================
      HOSPITAL TYPE
  ========================== */

  function getHospitalType(name){

    const government = [

      "مجمع فلسطين الطبي"

    ];

    const privateHospitals = [

      "المستشفى الاستشاري العربي",
      "مستشفى الرعاية التخصصي",
      "مستشفى دكتور ضرغام",
      "مستشفى الناظر للولادة"

    ];

    if(government.includes(name))
      return "government";

    if(privateHospitals.includes(name))
      return "private";

    return "private";

  }

  /* =========================
      DISTANCE FUNCTION
  ========================== */

  function distance(
    lat1,
    lon1,
    lat2,
    lon2
  ){

    const R = 6371;

    const dLat =
      (lat2-lat1) * Math.PI/180;

    const dLon =
      (lon2-lon1) * Math.PI/180;

    const a =

      Math.sin(dLat/2) *
      Math.sin(dLat/2)

      +

      Math.cos(lat1*Math.PI/180)

      *

      Math.cos(lat2*Math.PI/180)

      *

      Math.sin(dLon/2)

      *

      Math.sin(dLon/2);

    const c =

      2 *

      Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
      );

    return R * c;

  }

  /* =========================
      FIND NEAREST
  ========================== */

  function findNearestHospital(){

    if(!userLocation){

      alert("لم يتم تحديد موقعك بعد");

      return;

    }

    const selected =
      document.getElementById(
        "hospitalType"
      ).value;

    let nearest = null;

    let minDistance = Infinity;

    hospitals.forEach(h => {

      const name =
        h.properties.BUSNIESS_NAME_A;

      const type =
        getHospitalType(name);

      if(
        selected !== "all" &&
        type !== selected
      ) return;

      const lat =
        h.geometry.coordinates[1];

      const lon =
        h.geometry.coordinates[0];

      const d = distance(

        userLocation[0],
        userLocation[1],
        lat,
        lon

      );

      if(d < minDistance){

        minDistance = d;

        nearest = h;

      }

    });

    if(!nearest){

      alert("لا يوجد مستشفى");

      return;

    }

    const target = [

      nearest.geometry.coordinates[1],
      nearest.geometry.coordinates[0]

    ];

    if(routingControl){

      map.removeControl(routingControl);

    }

    routingControl =
      L.Routing.control({

        waypoints:[

          L.latLng(userLocation),

          L.latLng(target)

        ],

        routeWhileDragging:false

      }).addTo(map);

  }

</script>

</body>
</html>
