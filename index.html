<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ramallah Web GIS</title>

<!-- LEAFLET -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- ROUTING -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<style>

html,body{

  margin:0;
  height:100%;
  font-family:Arial;

}

#map{

  width:100%;
  height:100%;

}

/* =========================
    CONTROL BOX
========================== */

.control-box{

  position:absolute;

  bottom:20px;
  right:20px;

  z-index:1000;

  background:white;

  padding:12px;

  border-radius:10px;

  box-shadow:0 0 10px rgba(0,0,0,0.3);

  width:260px;

}

.control-box select,
.control-box button{

  width:100%;

  margin-top:8px;

  padding:8px;

  border-radius:6px;

  border:1px solid #ccc;

  font-size:13px;

  cursor:pointer;

}

/* =========================
    POPUP
========================== */

.popup-table{

  border-collapse:collapse;
  width:100%;

}

.popup-table td{

  border-bottom:1px solid #ddd;
  padding:4px;
  font-size:12px;

}

.popup-title{

  font-weight:bold;
  margin-bottom:6px;

}

/* =========================
    LEGEND
========================== */

.legend{

  background:white;

  padding:10px;

  border-radius:10px;

  box-shadow:0 0 10px rgba(0,0,0,0.3);

  line-height:22px;

  font-size:13px;

}

/* =========================
    CONTROL POSITION
========================== */

.leaflet-top.leaflet-right{

  top:10px;
  right:10px;

}

.leaflet-bottom.leaflet-left{

  bottom:10px;
  left:10px;

}


/* =========================
    LIVE NAVIGATION PANEL
========================== */

.route-info{

  margin-top:10px;
  padding:8px;
  background:#f7f7f7;
  border-radius:8px;
  font-size:12px;
  line-height:1.7;
  max-height:170px;
  overflow:auto;

}

.route-info b{

  color:#222;

}

.user-arrow{

  font-size:28px;
  color:#007bff;
  width:30px;
  height:30px;
  line-height:30px;
  text-align:center;
  transform-origin:center center;

}

.nav-active-button{

  background:#007bff !important;
  color:white;
  font-weight:bold;

}

.off-route-warning{

  margin-top:8px;
  padding:8px;
  background:#fff3cd;
  border:1px solid #ffecb5;
  border-radius:8px;
  color:#7a4f00;
  font-size:12px;
  display:none;

}

.speed-box{

  margin-top:8px;
  padding:8px;
  background:#f5f5f5;
  border-radius:6px;
  font-size:13px;

}


</style>
</head>

<body>

<div id="map"></div>

<!-- =========================
     CONTROL BOX
========================= -->

<div class="control-box">

  <b>البحث عن المستشفيات</b>

  <select id="hospitalType">

    <option value="all">
      جميع المستشفيات
    </option>

    <option value="government">
      حكومي
    </option>

    <option value="private">
      خاص
    </option>

  </select>

  <select id="hospitalSelect">

    <option value="">
      اختر مستشفى
    </option>

  </select>

  <button onclick="findNearestHospital()">
    أقرب مستشفى
  </button>

  <button onclick="goToSelectedHospital()">
    الانتقال للمستشفى المحدد
  </button>

  <select id="routingProfile" onchange="changeRoutingProfile()">

    <option value="driving">
      مسار سيارة
    </option>

    <option value="walking">
      مسار مشي
    </option>

    <option value="cycling">
      مسار دراجة
    </option>

  </select>

  <button onclick="recenterToUser()">
    إعادة التمركز على موقعي
  </button>

  <div id="speedInfo" class="speed-box">
    السرعة الحالية: غير متاحة
  </div>

  <button id="navigationModeBtn" onclick="toggleNavigationMode()">
    تشغيل وضع الملاحة
  </button>

  <div id="offRouteWarning" class="off-route-warning">
    لقد خرجت عن المسار، جارٍ إعادة التوجيه...
  </div>

  <div id="routeInfo" class="route-info">
    <b>معلومات المسار</b><br>
    اختر مستشفى لعرض المسافة والوقت والتعليمات.
  </div>

</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ROUTING -->
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<!-- ROUTE ARROWS -->
<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script>

/* =========================
    MAP
========================== */

var map = L.map("map").setView([31.9038,35.2034],11);

/* =========================
    BASEMAPS
========================== */

var lightMap = L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
  attribution:"© OpenStreetMap"
}
).addTo(map);

var darkMap = L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
{
  attribution:"© CARTO"
}
);

/* =========================
    VARIABLES
========================== */

let hospitals = [];
let userLocation = null;
let routingControl = null;

let userMarker = null;
let lastLocation = null;
let activeTarget = null;
let routeDecorator = null;
let lastRouteUpdateLocation = null;
let currentRouteCoordinates = [];
let isNavigationMode = false;
let selectedRoutingProfile = "driving";
let currentBearing = 0;
let lastOffRouteAlertTime = 0;

const rerouteDistanceMeters = 20;
const offRouteDistanceMeters = 50;
const offRouteAlertDelay = 8000;

/* =========================
    USER LOCATION + LIVE TRACKING + DIRECTION
========================== */

function calculateBearing(lat1, lon1, lat2, lon2){

  lat1 = lat1 * Math.PI / 180;
  lat2 = lat2 * Math.PI / 180;

  let dLon =
  (lon2 - lon1) * Math.PI / 180;

  let y =
  Math.sin(dLon) * Math.cos(lat2);

  let x =
  Math.cos(lat1) * Math.sin(lat2) -
  Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);

  let bearing =
  Math.atan2(y, x) * 180 / Math.PI;

  return (bearing + 360) % 360;

}

function toggleNavigationMode(){

  isNavigationMode = !isNavigationMode;

  let btn = document.getElementById("navigationModeBtn");

  if(isNavigationMode){

    btn.innerText = "إيقاف وضع الملاحة";
    btn.classList.add("nav-active-button");

    if(userLocation){
      map.setView(userLocation, Math.max(map.getZoom(), 17));
    }

  }

  else{

    btn.innerText = "تشغيل وضع الملاحة";
    btn.classList.remove("nav-active-button");
    resetMapRotation();

  }

}

function applyNavigationMode(angle){

  if(!isNavigationMode || !userLocation){
    return;
  }

  map.setView(userLocation, Math.max(map.getZoom(), 17), {
    animate:true
  });

  rotateMap(-angle);

}

function rotateMap(angle){

  let pane = map.getPane("mapPane");

  if(pane){
    pane.style.transform += ` rotate(${angle}deg)`;
    pane.style.transformOrigin = "50% 50%";
  }

}

function resetMapRotation(){

  let pane = map.getPane("mapPane");

  if(pane){
    pane.style.transform = pane.style.transform.replace(/ rotate\([^)]*\)/g, "");
  }

}


function recenterToUser(){

  if(!userLocation){

    alert("لم يتم تحديد موقعك بعد");
    return;

  }

  map.setView(userLocation, Math.max(map.getZoom(), 17), {
    animate:true
  });

}

function updateSpeed(speedMetersPerSecond){

  let speedInfo = document.getElementById("speedInfo");

  if(!speedInfo){
    return;
  }

  if(speedMetersPerSecond === null || speedMetersPerSecond === undefined || isNaN(speedMetersPerSecond)){

    speedInfo.innerHTML = "السرعة الحالية: غير متاحة";
    return;

  }

  let speedKmH = speedMetersPerSecond * 3.6;
  speedInfo.innerHTML = "السرعة الحالية: " + speedKmH.toFixed(1) + " كم/ساعة";

}

function changeRoutingProfile(){

  selectedRoutingProfile = document.getElementById("routingProfile").value;

  if(routingControl && activeTarget && userLocation){

    drawRouteToTarget(activeTarget);

  }

}

function distanceToRouteMeters(point, routeCoordinates){

  if(!routeCoordinates || routeCoordinates.length < 2){
    return Infinity;
  }

  let minDistance = Infinity;
  let latScale = 111320;
  let lonScale = 111320 * Math.cos(point[0] * Math.PI / 180);

  let px = point[1] * lonScale;
  let py = point[0] * latScale;

  for(let i = 0; i < routeCoordinates.length - 1; i++){

    let a = routeCoordinates[i];
    let b = routeCoordinates[i + 1];

    let ax = a.lng * lonScale;
    let ay = a.lat * latScale;
    let bx = b.lng * lonScale;
    let by = b.lat * latScale;

    let dx = bx - ax;
    let dy = by - ay;

    let t = 0;

    if(dx !== 0 || dy !== 0){
      t = ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy);
      t = Math.max(0, Math.min(1, t));
    }

    let closestX = ax + t * dx;
    let closestY = ay + t * dy;

    let d = Math.sqrt(
      Math.pow(px - closestX, 2) +
      Math.pow(py - closestY, 2)
    );

    if(d < minDistance){
      minDistance = d;
    }

  }

  return minDistance;

}

function showOffRouteWarning(){

  let warning = document.getElementById("offRouteWarning");

  if(warning){
    warning.style.display = "block";
  }

  setTimeout(function(){

    if(warning){
      warning.style.display = "none";
    }

  }, 5000);

}

function checkOffRoute(){

  if(!routingControl || !activeTarget || currentRouteCoordinates.length < 2){
    return;
  }

  let distanceFromRoute = distanceToRouteMeters(userLocation, currentRouteCoordinates);
  let now = Date.now();

  if(
    distanceFromRoute > offRouteDistanceMeters &&
    now - lastOffRouteAlertTime > offRouteAlertDelay
  ){

    lastOffRouteAlertTime = now;
    showOffRouteWarning();

    routingControl.setWaypoints([
      L.latLng(userLocation),
      L.latLng(activeTarget)
    ]);

    lastRouteUpdateLocation = [...userLocation];

  }

}

const arrowIcon = L.divIcon({

  className:"",
  html:`<div id="userArrow" class="user-arrow">➤</div>`,
  iconSize:[30,30],
  iconAnchor:[15,15]

});

function updateUserMarker(newLocation){

  let angle = 0;

  if(lastLocation){

    angle = calculateBearing(

      lastLocation[0],
      lastLocation[1],
      newLocation[0],
      newLocation[1]

    );

    currentBearing = angle;

  }

  if(!userMarker){

    userMarker = L.marker(newLocation,{

      icon:arrowIcon

    })
    .addTo(map)
    .bindPopup("موقعك الحالي");

  }

  else{

    userMarker.setLatLng(newLocation);

  }

  let arrow =
  document.getElementById("userArrow");

  if(arrow){

    arrow.style.transform =
    `rotate(${angle}deg)`;

  }

  applyNavigationMode(currentBearing);

  lastLocation = newLocation;

}

function checkAutoReroute(){

  if(!routingControl || !activeTarget || !lastRouteUpdateLocation){
    return;
  }

  let movedMeters = distance(

    lastRouteUpdateLocation[0],
    lastRouteUpdateLocation[1],
    userLocation[0],
    userLocation[1]

  ) * 1000;

  if(movedMeters >= rerouteDistanceMeters){

    routingControl.setWaypoints([

      L.latLng(userLocation),
      L.latLng(activeTarget)

    ]);

    lastRouteUpdateLocation = [...userLocation];

  }

}

navigator.geolocation.watchPosition(function(pos){

  userLocation = [

    pos.coords.latitude,
    pos.coords.longitude

  ];

  updateSpeed(pos.coords.speed);
  updateUserMarker(userLocation);
  checkAutoReroute();
  checkOffRoute();

}, function(){

  alert("لم يتم السماح بتحديد الموقع");

}, {

  enableHighAccuracy:true,
  maximumAge:0,
  timeout:10000

});

/* =========================
    POPUP
========================== */

function popupAttributes(feature, layer){

  if(!feature.properties) return;

  let html = `
    <div class="popup-title">
      Attributes
    </div>

    <table class="popup-table">
  `;

  for(let key in feature.properties){

    html += `
      <tr>
        <td><b>${key}</b></td>
        <td>${feature.properties[key]}</td>
      </tr>
    `;

  }

  html += `</table>`;

  layer.bindPopup(html);

}

/* =========================
    LOAD DATA
========================== */

Promise.all([

  fetch("Ramallah_Boundary.json")
  .then(r=>r.json()),

  fetch("Road_Network.json")
  .then(r=>r.json()),

  fetch("Living.json")
  .then(r=>r.json()),

  fetch("Parking.json")
  .then(r=>r.json()),

  fetch("Health_Services.json")
  .then(r=>r.json())

]).then(initLayers);

/* =========================
    INIT LAYERS
========================== */

function initLayers(data){

  let [

    boundary,
    roads,
    living,
    parking,
    health

  ] = data;

  /* =========================
      BOUNDARY
  ========================== */

  var boundaryLayer = L.geoJSON(boundary,{

    style:{

      color:"#ffffff",
      weight:3,
      fillOpacity:0

    },

    onEachFeature:popupAttributes

  }).addTo(map);

  /* =========================
      ROADS
  ========================== */

  var roadsLayer = L.geoJSON(roads,{

    style:function(feature){

      let roadType =
      feature.properties.type;

      if(
        roadType === "Regional" ||
        roadType === "اقليمي"
      ){

        return{

          color:"#ff3300",
          weight:5

        };

      }

      else{

        return{

          color:"#ffaa00",
          weight:2

        };

      }

    },

    onEachFeature:popupAttributes

  }).addTo(map);

  /* =========================
      LIVING
  ========================== */

  var livingLayer = L.geoJSON(living,{

    style:{

      color:"#00bfff",
      weight:2,
      fillOpacity:0

    },

    onEachFeature:popupAttributes

  }).addTo(map);

  /* =========================
      PARKING
  ========================== */

  var parkingLayer = L.geoJSON(parking,{

    style:{

      color:"#1b5e20",
      weight:1.5,
      fillColor:"#2e7d32",
      fillOpacity:0.8

    },

    onEachFeature:popupAttributes

  }).addTo(map);

  /* =========================
      HEALTH
  ========================== */

  var healthLayer = L.geoJSON(health,{

    pointToLayer:function(feature,latlng){

      return L.circleMarker(latlng,{

        radius:6,
        fillColor:"#ff0000",
        color:"#ffffff",
        weight:1,
        fillOpacity:0.9

      });

    },

    onEachFeature:function(feature,layer){

      popupAttributes(feature,layer);

      hospitals.push(feature);

      let name =
      feature.properties.BUSNIESS_NAME_A;

      let option =
      document.createElement("option");

      option.value = name;
      option.text = name;

      document
      .getElementById("hospitalSelect")
      .appendChild(option);

    }

  }).addTo(map);

  /* =========================
      FIT BOUNDS
  ========================== */

  map.fitBounds(
    boundaryLayer.getBounds()
  );

  /* =========================
      LAYER CONTROL
  ========================== */

  var baseMaps = {

    "Light Mode":lightMap,
    "Dark Mode":darkMap

  };

  var overlayMaps = {

    "Ramallah Boundary":
    boundaryLayer,

    "Road Network":
    roadsLayer,

    "Living Areas":
    livingLayer,

    "Parking":
    parkingLayer,

    "Health Services":
    healthLayer

  };

  L.control.layers(

    baseMaps,
    overlayMaps,

    {
      collapsed:false
    }

  ).addTo(map);

  /* =========================
      LEGEND
  ========================== */

  var legend =
  L.control({
    position:"bottomleft"
  });

  legend.onAdd = function(){

    var div =
    L.DomUtil.create(
      "div",
      "legend"
    );

    div.innerHTML = `

      <b>Legend</b><br><br>

      <div>
        <span style="
        width:16px;
        height:16px;
        background:#ff3300;
        display:inline-block;
        ">
        </span>

        Regional Roads
      </div>

      <div>
        <span style="
        width:16px;
        height:16px;
        background:#ffaa00;
        display:inline-block;
        ">
        </span>

        Internal Roads
      </div>

      <div>
        <span style="
        width:16px;
        height:16px;
        background:#2e7d32;
        display:inline-block;
        ">
        </span>

        Parking
      </div>

      <div>
        <span style="
        width:16px;
        height:16px;
        background:#ff0000;
        border-radius:50%;
        display:inline-block;
        ">
        </span>

        Health Services
      </div>

    `;

    return div;

  };

  legend.addTo(map);

}

/* =========================
    HOSPITAL TYPE
========================== */

function getHospitalType(name){

  const government = [

    "مجمع فلسطين الطبي"

  ];

  const privateHospitals = [

    "المستشفى الاستشاري العربي",
    "مستشفى الرعاية التخصصي",
    "مستشفى دكتور ضرغام",
    "مستشفى الناظر للولادة"

  ];

  if(government.includes(name))
    return "government";

  if(privateHospitals.includes(name))
    return "private";

  return "private";

}

/* =========================
    DISTANCE
========================== */

function distance(lat1,lon1,lat2,lon2){

  const R = 6371;

  const dLat =
  (lat2-lat1) *
  Math.PI/180;

  const dLon =
  (lon2-lon1) *
  Math.PI/180;

  const a =

  Math.sin(dLat/2) *
  Math.sin(dLat/2)

  +

  Math.cos(lat1*Math.PI/180) *
  Math.cos(lat2*Math.PI/180) *

  Math.sin(dLon/2) *
  Math.sin(dLon/2);

  const c =

  2 * Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a)
  );

  return R*c;

}

/* =========================
    FIND NEAREST
========================== */

function findNearestHospital(){

  if(!userLocation){

    alert("لم يتم تحديد موقعك");
    return;

  }

  const selected =
  document.getElementById("hospitalType").value;

  let nearest = null;

  let minDistance = Infinity;

  hospitals.forEach(h=>{

    const name =
    h.properties.BUSNIESS_NAME_A;

    const type =
    getHospitalType(name);

    if(
      selected !== "all" &&
      type !== selected
    )
    return;

    const lat =
    h.geometry.coordinates[1];

    const lon =
    h.geometry.coordinates[0];

    const d = distance(

      userLocation[0],
      userLocation[1],
      lat,
      lon

    );

    if(d < minDistance){

      minDistance = d;
      nearest = h;

    }

  });

  if(!nearest){

    alert("لا يوجد مستشفى");
    return;

  }

  drawRoute(nearest);

}

/* =========================
    SELECTED HOSPITAL
========================== */

function goToSelectedHospital(){

  const selectedHospital =
  document.getElementById("hospitalSelect").value;

  if(selectedHospital === ""){

    alert("اختر مستشفى");
    return;

  }

  let targetHospital = null;

  hospitals.forEach(h=>{

    if(

      h.properties.BUSNIESS_NAME_A
      ===
      selectedHospital

    ){

      targetHospital = h;

    }

  });

  if(!targetHospital){

    alert("المستشفى غير موجود");
    return;

  }

  drawRoute(targetHospital);

}


/* =========================
    ROUTE INFO + INSTRUCTIONS + ARROWS
========================== */

function formatDistance(meters){

  if(meters >= 1000){
    return (meters / 1000).toFixed(2) + " كم";
  }

  return Math.round(meters) + " متر";

}

function formatTime(seconds){

  let minutes = Math.round(seconds / 60);

  if(minutes < 60){
    return minutes + " دقيقة";
  }

  let hours = Math.floor(minutes / 60);
  let remainingMinutes = minutes % 60;

  return hours + " ساعة و " + remainingMinutes + " دقيقة";

}

function updateRouteInfo(route){

  let routeInfo =
  document.getElementById("routeInfo");

  let distanceText =
  formatDistance(route.summary.totalDistance);

  let timeText =
  formatTime(route.summary.totalTime);

  let instructionsHtml = "";

  if(route.instructions && route.instructions.length > 0){

    instructionsHtml =
    route.instructions
    .slice(0,8)
    .map((instruction,index)=>{

      return `${index + 1}. ${instruction.text}`;

    })
    .join("<br>");

  }

  routeInfo.innerHTML = `

    <b>معلومات المسار</b><br>
    المسافة: ${distanceText}<br>
    الوقت المتوقع: ${timeText}<br><br>
    <b>تعليمات الملاحة</b><br>
    ${instructionsHtml || "لا توجد تعليمات متاحة"}

  `;

}

function drawRouteArrows(route){

  if(routeDecorator){

    map.removeLayer(routeDecorator);

  }

  let coordinates =
  route.coordinates.map(c=>[c.lat,c.lng]);

  routeDecorator = L.polylineDecorator(coordinates,{

    patterns:[

      {
        offset:25,
        repeat:80,
        symbol:L.Symbol.arrowHead({

          pixelSize:12,
          polygon:false,
          pathOptions:{
            stroke:true,
            weight:2,
            color:"#0066ff"
          }

        })
      }

    ]

  }).addTo(map);

}

/* =========================
    DRAW ROUTE
========================== */

function drawRoute(hospital){

  if(!userLocation){

    alert("لم يتم تحديد موقعك بعد");
    return;

  }

  const target = [

    hospital.geometry.coordinates[1],
    hospital.geometry.coordinates[0]

  ];

  drawRouteToTarget(target);

}

function drawRouteToTarget(target){

  if(!userLocation){

    alert("لم يتم تحديد موقعك بعد");
    return;

  }

  activeTarget = target;
  lastRouteUpdateLocation = [...userLocation];

  if(routingControl){

    map.removeControl(routingControl);

  }

  if(routeDecorator){

    map.removeLayer(routeDecorator);
    routeDecorator = null;

  }

  currentRouteCoordinates = [];

  routingControl =
  L.Routing.control({

    router:L.Routing.osrmV1({

      serviceUrl:"https://router.project-osrm.org/route/v1",
      profile:selectedRoutingProfile

    }),

    waypoints:[

      L.latLng(userLocation),
      L.latLng(target)

    ],

    routeWhileDragging:false,

    addWaypoints:false,

    draggableWaypoints:false,

    fitSelectedRoutes:true,

    show:false,

    lineOptions:{

      styles:[

        {
          color:"#0066ff",
          weight:6,
          opacity:0.8
        }

      ]

    },

    createMarker:function(){
      return null;
    }

  }).addTo(map);

  routingControl.on("routesfound",function(e){

    let route = e.routes[0];

    currentRouteCoordinates = route.coordinates;

    updateRouteInfo(route);
    drawRouteArrows(route);

  });

  routingControl.on("routingerror",function(){

    document.getElementById("routeInfo").innerHTML =
    `<b>معلومات المسار</b><br>تعذر حساب المسار لهذا النوع من التنقل. جرّب نوعاً آخر أو تأكد من اتصال الإنترنت.`;

  });

}

</script>

</body>
</html>
