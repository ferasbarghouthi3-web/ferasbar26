<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Ramallah Advanced Web GIS</title>

<!-- LEAFLET -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- ROUTING -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<!-- GEOCODER -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<!-- DRAW -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<!-- FULLSCREEN -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/2.4.0/Control.FullScreen.min.css"/>

<!-- AWESOME ICONS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- MINI MAP -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.css"/>

<style>

html,body{

height:100%;
margin:0;
font-family:Arial,sans-serif;

}

#map{

width:100%;
height:100%;

}

/* =========================
    SEARCH BOX
========================== */

.control-box{

position:absolute;

bottom:20px;
right:20px;

z-index:1000;

background:white;

padding:12px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.3);

width:250px;

}

.control-box h3{

margin-top:0;

}

.control-box select,
.control-box button{

width:100%;
padding:8px;
margin-top:8px;

}

.control-box button{

background:#007bff;
color:white;

border:none;

border-radius:6px;

cursor:pointer;

}

.control-box button:hover{

background:#0056b3;

}

/* =========================
    LEGEND
========================== */

.legend{

background:white;

padding:10px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.3);

line-height:22px;

font-size:13px;

}

.legend-box{

width:16px;
height:16px;

display:inline-block;

margin-right:6px;

}

/* =========================
    POPUP
========================== */

.popup-table{

border-collapse:collapse;

width:100%;

}

.popup-table td{

border-bottom:1px solid #ddd;

padding:4px;

font-size:12px;

}

.popup-title{

font-weight:bold;

margin-bottom:6px;

}

/* =========================
    COUNTER BOX
========================== */

.info-box{

position:absolute;

top:20px;
left:60px;

z-index:1000;

background:white;

padding:10px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.3);

font-size:13px;

line-height:24px;

}

</style>

</head>

<body>

<!-- SEARCH BOX -->

<div class="control-box">

<h3>
البحث عن أقرب مستشفى
</h3>

<select id="hospitalType">

<option value="all">
جميع المستشفيات
</option>

<option value="government">
حكومي
</option>

<option value="private">
خاص
</option>

</select>

<button onclick="findNearestHospital()">

ايجاد أقرب مستشفى

</button>

</div>

<!-- INFO COUNTER -->

<div class="info-box"
id="infoBox">

جاري التحميل...

</div>

<!-- MAP -->

<div id="map"></div>

<!-- LEAFLET -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ROUTING -->

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<!-- GEOCODER -->

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<!-- HEATMAP -->

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<!-- DRAW -->

<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<!-- FULLSCREEN -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/2.4.0/Control.FullScreen.min.js"></script>

<!-- MINIMAP -->

<script src="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.js"></script>

<script>

const map = L.map("map",{

fullscreenControl:true

}).setView([31.9038,35.2034],13);

/* =========================
    BASEMAPS
========================== */

var lightMap = L.tileLayer(

"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",

{

attribution:"OpenStreetMap"

}

).addTo(map);

var darkMap = L.tileLayer(

"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",

{

attribution:"CARTO"

}

);

/* =========================
    MINI MAP
========================== */

new L.Control.MiniMap(lightMap,{

toggleDisplay:true

}).addTo(map);

/* =========================
    SCALE
========================== */

L.control.scale().addTo(map);

/* =========================
    SEARCH
========================== */

L.Control.geocoder().addTo(map);

/* =========================
    DRAW TOOLS
========================== */

var drawnItems = new L.FeatureGroup();

map.addLayer(drawnItems);

var drawControl = new L.Control.Draw({

edit:{

featureGroup:drawnItems

}

});

map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.addLayer(e.layer);

});

/* =========================
    VARIABLES
========================== */

let userLocation = null;

let hospitals = [];

let routingControl = null;

/* =========================
    USER LOCATION
========================== */

navigator.geolocation.getCurrentPosition(pos=>{

userLocation = [

pos.coords.latitude,
pos.coords.longitude

];

L.marker(userLocation)

.addTo(map)

.bindPopup("موقعك الحالي")

.openPopup();

map.setView(userLocation,14);

});

/* =========================
    POPUP
========================== */

function popupAttributes(feature,layer){

if(!feature.properties) return;

let html = `

<div class="popup-title">

Attributes

</div>

<table class="popup-table">

`;

for(let key in feature.properties){

html += `

<tr>

<td>
<b>${key}</b>
</td>

<td>
${feature.properties[key]}
</td>

</tr>

`;

}

html += `</table>`;

layer.bindPopup(html);

}

/* =========================
    LOAD DATA
========================== */

Promise.all([

fetch("Ramallah_Boundary.json")
.then(r=>r.json()),

fetch("Road_Network.json")
.then(r=>r.json()),

fetch("Living.json")
.then(r=>r.json()),

fetch("Parking.json")
.then(r=>r.json()),

fetch("Health_Services.json")
.then(r=>r.json())

]).then(initLayers);

/* =========================
    INIT LAYERS
========================== */

function initLayers(data){

let [

boundary,
roads,
living,
parking,
health

] = data;

hospitals = health.features;

/* =========================
    BOUNDARY
========================== */

var boundaryLayer = L.geoJSON(boundary,{

style:{

color:"#ffffff",
weight:3,
fillOpacity:0

},

onEachFeature:popupAttributes

}).addTo(map);

/* =========================
    ROADS
========================== */

var roadsLayer = L.geoJSON(roads,{

style:function(feature){

let roadType =
feature.properties.type;

if(

roadType === "Regional" ||
roadType === "اقليمي"

){

return{

color:"#ff3300",
weight:5

};

}

else{

return{

color:"#ffaa00",
weight:2

};

}

},

onEachFeature:function(feature,layer){

popupAttributes(feature,layer);

layer.on("mouseover",function(){

layer.bindTooltip(

feature.properties.type || "Road"

).openTooltip();

});

}

}).addTo(map);

/* =========================
    LIVING
========================== */

var livingLayer = L.geoJSON(living,{

style:{

color:"#00bfff",
weight:2,
fillOpacity:0

},

onEachFeature:popupAttributes

}).addTo(map);

/* =========================
    PARKING
========================== */

var parkingLayer = L.geoJSON(parking,{

style:{

color:"#1b5e20",
weight:1.5,
fillColor:"#2e7d32",
fillOpacity:0.8

},

onEachFeature:popupAttributes

}).addTo(map);

/* =========================
    HEALTH SERVICES
========================== */

var healthLayer = L.geoJSON(health,{

pointToLayer:function(feature,latlng){

return L.circleMarker(latlng,{

radius:7,

fillColor:"#ff0000",

color:"#ffffff",

weight:1,

fillOpacity:0.9

});

},

onEachFeature:function(feature,layer){

popupAttributes(feature,layer);

layer.on("mouseover",function(){

layer.bindTooltip(

feature.properties.BUSNIESS_NAME_A

).openTooltip();

});

}

}).addTo(map);

/* =========================
    HEATMAP
========================== */

let heatPoints = [];

health.features.forEach(f=>{

heatPoints.push([

f.geometry.coordinates[1],

f.geometry.coordinates[0],

1

]);

});

var heatLayer = L.heatLayer(heatPoints,{

radius:25

});

/* =========================
    FIT BOUNDS
========================== */

map.fitBounds(boundaryLayer.getBounds());

/* =========================
    COUNTER BOX
========================== */

document.getElementById("infoBox").innerHTML = `

<b>احصائيات الخريطة</b>

<br>

عدد المستشفيات:
${health.features.length}

<br>

عدد الشوارع:
${roads.features.length}

<br>

عدد مواقف السيارات:
${parking.features.length}

`;

/* =========================
    LAYER CONTROL
========================== */

var baseMaps = {

"Light Mode":lightMap,

"Dark Mode":darkMap

};

var overlayMaps = {

"Boundary":boundaryLayer,

"Roads":roadsLayer,

"Living":livingLayer,

"Parking":parkingLayer,

"Hospitals":healthLayer,

"Heatmap":heatLayer,

"Drawings":drawnItems

};

L.control.layers(

baseMaps,
overlayMaps,

{

collapsed:false

}

).addTo(map);

/* =========================
    LEGEND
========================== */

var legend = L.control({

position:"bottomleft"

});

legend.onAdd = function(){

var div =
L.DomUtil.create("div","legend");

div.innerHTML = `

<b>Legend</b>

<br><br>

<div>

<span class="legend-box"

style="background:#ff3300;">

</span>

Regional Roads

</div>

<div>

<span class="legend-box"

style="background:#ffaa00;">

</span>

Internal Roads

</div>

<div>

<span class="legend-box"

style="background:#00bfff;">

</span>

Living Areas

</div>

<div>

<span class="legend-box"

style="background:#2e7d32;">

</span>

Parking

</div>

<div>

<span class="legend-box"

style="background:#ff0000;
border-radius:50%;">

</span>

Hospitals

</div>

`;

return div;

};

legend.addTo(map);

}

/* =========================
    DISTANCE
========================== */

function distance(lat1,lon1,lat2,lon2){

const R = 6371;

const dLat =
(lat2-lat1)*Math.PI/180;

const dLon =
(lon2-lon1)*Math.PI/180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1*Math.PI/180)

*

Math.cos(lat2*Math.PI/180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =

2 *

Math.atan2(

Math.sqrt(a),

Math.sqrt(1-a)

);

return R*c;

}

/* =========================
    HOSPITAL TYPE
========================== */

function getHospitalType(name){

const government = [

"مجمع فلسطين الطبي"

];

if(government.includes(name))
return "government";

return "private";

}

/* =========================
    FIND NEAREST HOSPITAL
========================== */

function findNearestHospital(){

if(!userLocation){

alert("لم يتم تحديد موقعك");

return;

}

const selected =

document.getElementById(
"hospitalType"
).value;

let nearest = null;

let minDistance = Infinity;

hospitals.forEach(h=>{

const name =
h.properties.BUSNIESS_NAME_A;

const type =
getHospitalType(name);

if(

selected !== "all" &&
type !== selected

) return;

const lat =
h.geometry.coordinates[1];

const lon =
h.geometry.coordinates[0];

const d = distance(

userLocation[0],
userLocation[1],

lat,
lon

);

if(d < minDistance){

minDistance = d;

nearest = h;

}

});

if(!nearest){

alert("لا يوجد مستشفى");

return;

}

const target = [

nearest.geometry.coordinates[1],

nearest.geometry.coordinates[0]

];

if(routingControl){

map.removeControl(routingControl);

}

routingControl =

L.Routing.control({

waypoints:[

L.latLng(userLocation),

L.latLng(target)

],

routeWhileDragging:false

}).addTo(map);

}

/* =========================
    SHOW COORDINATES
========================== */

map.on("click",function(e){

console.log(

"Latitude: " + e.latlng.lat +

" Longitude: " + e.latlng.lng

);

});

</script>

</body>
</html>
